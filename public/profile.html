<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');
            
            if (!token || !role) {
                window.location.replace('login.html');
                return;
            }
            
            // If there's a student parameter in the URL, go to student-profile.html regardless of user role
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('student') || urlParams.has('studentId')) {
                const id = urlParams.get('student') || urlParams.get('studentId');
                window.location.replace('student-profile.html?studentId=' + id);
                return;
            }
            
            if (role === 'teacher') {
                window.location.replace('teacher-profile.html' + window.location.search);
            } else if (role === 'student') {
                window.location.replace('student-profile.html' + window.location.search);
            } else {
                window.location.replace('login.html');
            }
        });
    </script>
</head>
<body>
    <p>Redirecting to your profile...</p>
</body>
</html>
